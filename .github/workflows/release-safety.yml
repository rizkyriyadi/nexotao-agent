name: Release safety

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Cross-platform package Definition-of-Done: lint, typecheck, unit +
  # fault-injection tests, build, production audit gate, and a clean
  # pack/install/launch/health/repository/shutdown smoke on every supported
  # OS and Node version.
  matrix:
    name: verify (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
      - name: Pack, install, launch, health, and shutdown
        shell: bash
        run: |
          PACKAGE=$(npm pack --silent --ignore-scripts)
          node scripts/release-smoke.mjs "$PWD/$PACKAGE"

  # Real-browser critical-flow E2E and the enforced accessibility audit. These
  # need a Chromium, so they run once on Linux against the built app.
  browser:
    name: browser e2e + a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install Chromium for puppeteer
        run: npx --yes @puppeteer/browsers install chrome-headless-shell@stable --path "$PWD/.cache/puppeteer"
      - run: npm run build
      - name: End-to-end critical flows
        run: npm run test:e2e
      - name: Accessibility audit
        run: npm run audit:a11y
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: e2e-artifacts/
          if-no-files-found: ignore
